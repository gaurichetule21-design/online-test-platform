<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results — Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="brand"><span class="brand-mark"></span>SLATE</a>
    <div class="nav-links">
      <a href="dashboard.html?role=student">Back to dashboard</a>
    </div>
  </div>
</nav>

<main class="container container--narrow" id="result-root" style="padding-top:48px; padding-bottom:80px;">

  <span class="eyebrow">Result</span>
  <h1 id="result-title" style="font-size:26px;">Loading…</h1>

  <div class="card card-pad" style="padding:32px; text-align:center; margin-bottom:24px;">
    <span class="text-faint" style="font-size:13px;">Score</span>
    <h2 class="mono" id="result-score" style="font-size:48px; color:var(--accent); margin:6px 0;">—</h2>
    <span class="mono" id="result-pct" style="font-size:15px; color:var(--text-muted);">—</span>
  </div>

  <div class="grid-3" style="margin-bottom:32px;">
    <div class="card card-pad" style="text-align:center;">
      <span class="mono" id="count-correct" style="font-size:22px; color:var(--success);">—</span><br>
      <span class="text-faint" style="font-size:12px;">Correct</span>
    </div>
    <div class="card card-pad" style="text-align:center;">
      <span class="mono" id="count-incorrect" style="font-size:22px; color:var(--danger);">—</span><br>
      <span class="text-faint" style="font-size:12px;">Incorrect</span>
    </div>
    <div class="card card-pad" style="text-align:center;">
      <span class="mono" id="count-skipped" style="font-size:22px; color:var(--text-faint);">—</span><br>
      <span class="text-faint" style="font-size:12px;">Skipped</span>
    </div>
  </div>

  <p class="text-faint" style="font-size:13px; margin-bottom:24px;">Time taken: <span class="mono" id="result-time">—</span></p>

  <h2 style="font-size:18px;">Answer breakdown</h2>
  <div id="breakdown-list"></div>

  <a href="dashboard.html?role=student" class="btn btn-secondary btn-block" style="margin-top:16px;">Back to dashboard</a>

</main>

<script src="js/app.js"></script>
</body>
</html>
