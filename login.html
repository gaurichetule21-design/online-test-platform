<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="brand"><span class="brand-mark"></span>SLATE</a>
    <span class="nav-tag">demo mode</span>
  </div>
</nav>

<main class="container container--narrow" style="padding-top:80px;">
  <div class="card card-pad" style="padding:36px;">
    <span class="eyebrow">Welcome back</span>
    <h1 style="font-size:26px;">Log in to Slate</h1>
    <p style="margin-bottom:24px;">Enter your credentials to access your account.</p>

    <div class="field">
      <label>I am a…</label>
      <div class="cluster">
        <button type="button" class="btn btn-secondary is-selected" data-role-option="student">Student</button>
        <button type="button" class="btn btn-secondary" data-role-option="instructor">Instructor</button>
      </div>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="abc@gmaol.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      <p class="field-hint" style="text-align:center; margin-top:14px;">No account yet? Just pick a role and sign in — accounts aren't required for this preview.</p>
    </form>
  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
