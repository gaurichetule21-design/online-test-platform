<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create a test — Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="brand"><span class="brand-mark"></span>SLATE</a>
    <div class="nav-links">
      <a href="dashboard.html?role=instructor">Cancel</a>
    </div>
  </div>
</nav>

<main class="container" style="padding-top:40px; padding-bottom:80px;">
  <div class="spread" style="align-items:flex-start; gap:32px;">

    <div style="flex:2; min-width:0;">
      <span class="eyebrow">New test</span>
      <h1 style="font-size:26px; margin-bottom:24px;">Build a test</h1>

      <div class="card card-pad" style="margin-bottom:24px;">
        <div class="row">
          <div class="field" style="flex:2;">
            <label for="test-title">Test title</label>
            <input type="text" id="test-title" placeholder="e.g. JavaScript Fundamentals">
          </div>
          <div class="field" style="flex:1;">
            <label for="test-duration">Duration (minutes)</label>
            <input type="number" id="test-duration" placeholder="20" min="1">
          </div>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label for="test-description">Description (optional)</label>
          <textarea id="test-description" rows="2" placeholder="What's this test cover?"></textarea>
        </div>
      </div>

      <div id="question-list"></div>

      <button type="button" id="add-question" class="btn btn-secondary" style="margin-bottom:32px;">+ Add question</button>

      <div id="save-banner" class="card card-pad" hidden style="border-color:var(--accent); color:var(--accent); margin-bottom:16px;"></div>

      <div class="cluster">
        <button type="button" id="publish-test" class="btn btn-primary">Publish test</button>
        <button type="button" id="save-draft" class="btn btn-secondary">Save as draft</button>
      </div>
    </div>

    <aside style="flex:1; min-width:220px;">
      <div class="card card-pad" style="position:sticky; top:88px;">
        <span class="eyebrow">Summary</span>
        <h2 class="mono" style="font-size:32px; margin:0 0 4px; color:var(--accent);"><span id="summary-count">0</span></h2>
        <span class="text-faint" style="font-size:13px;">questions</span>
        <hr class="divider">
        <div id="summary-types" style="font-size:13px; line-height:1.8;"></div>
      </div>
    </aside>

  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
